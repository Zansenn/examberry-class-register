# Examberry brand theme. Colours taken from the logo
# (blue #2A3798, berry-red #EF2A1E, leaf-green #35A70D); font Inter, as on examberry.com.
[theme]
base = "light"
primaryColor = "#2A3798"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F6FA"
textColor = "#16213E"
linkColor = "#2A3798"
font = "Inter, sans-serif"

[[theme.fontFaces]]
